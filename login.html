<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Onde Tem?</title>

<link rel="stylesheet" href="stylesheet_login.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== FUNDO CENTRALIZADO ===== */
body{
    background:#553a73;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Poppins;
}

/* ===== CARD ===== */
.container{
    width:380px;
    background:#6b5286;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.5);
    display:flex;
    justify-content:center;
}

.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:35px 30px;
    box-sizing:border-box;
}

/* LOGO */
.logo img{
    width:90px;
}

/* TITULO */
.titulo-login{
    color:white;
    text-align:center;
    font-weight:500;
}

/* ===== TABS ===== */
.tipo-tabs{
    display:flex;
    gap:8px;
}

.tipo-tab{
    padding:8px 16px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.5);
    background:transparent;
    color:rgba(255,255,255,.7);
    cursor:pointer;
    font-size:.85rem;
    transition:.3s;
}
.tipo-tab:hover{background:rgba(255,255,255,.15);color:#fff;}
.tipo-tab.active{background:#fff;color:#553a73;font-weight:600}

/* ===== INPUTS ===== */
.acess{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
}

/* ===== BOTÕES ===== */
.button,.PF_PJ{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.button{
    background:#fff;
    color:#553a73;
}
.button:hover{
    transform:translateY(-1px);
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.PF_PJ{
    background:rgba(255,255,255,.15);
    color:#fff;
    border:1px solid rgba(255,255,255,.5);
}
.PF_PJ:hover{background:rgba(255,255,255,.25);}

/* ERRO */
.login-erro{
    color:#ff6b6b;
    font-size:.85rem;
    text-align:center;
    display:none;
}
.login-erro.show{display:block}

/* CADASTRO */
.cadastro-section{display:none}
.cadastro-section.show{display:block}

.cadastro-link{
    width:100%;
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* VOLTAR */
.voltar-link a{
    color:rgba(255,255,255,.7);
    font-size:.8rem;
    text-decoration:none;
}
.voltar-link a:hover{color:#fff}

</style>
</head>

<body>
<div class="container">
<div class="main">

<div class="logo">
<img src="img/Logo-png 5.svg">
</div>

<p class="titulo-login">Entrar como:</p>

<div class="tipo-tabs">
<button class="tipo-tab active" data-tipo="usuario" onclick="selecionarTipo('usuario')">Usuário</button>
<button class="tipo-tab" data-tipo="empresa" onclick="selecionarTipo('empresa')">Empresa</button>
<button class="tipo-tab" data-tipo="admin" onclick="selecionarTipo('admin')">Admin</button>
</div>

<div class="acess">
<input type="email" id="loginEmail" placeholder="E-mail">
<input type="password" id="loginSenha" placeholder="Senha">
<button class="button" id="btnLogin" onclick="fazerLogin()">Login | Acessar</button>
</div>

<div class="login-erro" id="loginErro"></div>

<div class="cadastro-section show" id="cadastroUsuario">
<div class="cadastro-link">
<p>Não tem uma conta?</p>
<button class="PF_PJ" onclick="window.location.href='cadastro-usuario.html'">
Cadastrar como Usuário
</button>
</div>
</div>

<div class="cadastro-section" id="cadastroEmpresa">
<div class="cadastro-link">
<p>Não tem uma conta empresarial?</p>
<button class="PF_PJ" onclick="window.location.href='cadastro-empresa.html'">
Cadastrar Empresa
</button>
</div>
</div>

<div class="cadastro-section" id="cadastroAdmin">
<div class="cadastro-link">
<p style="opacity:.6;font-size:.8rem">Acesso restrito a administradores</p>
</div>
</div>

<div class="voltar-link">
<a href="index.html">← Voltar ao site</a>
</div>

</div>
</div>

<script>
let tipoSelecionado='usuario';

function selecionarTipo(tipo){
    tipoSelecionado=tipo;
    document.querySelectorAll('.tipo-tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`[data-tipo="${tipo}"]`).classList.add('active');
    document.querySelectorAll('.cadastro-section').forEach(s=>s.classList.remove('show'));
    document.getElementById('cadastro'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).classList.add('show');
    esconderErro();
}

async function fazerLogin(){
    const email=loginEmail.value.trim();
    const senha=loginSenha.value;
    const btn=btnLogin;

    if(!email||!senha){mostrarErro('Preencha o e-mail e a senha.');return;}

    btn.disabled=true; btn.textContent='Entrando...'; esconderErro();

    try{
        const response=await fetch('/api/login',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({email,senha,tipo:tipoSelecionado})
        });

        const resultado=await response.json();

        if(response.ok){
            sessionStorage.setItem('ondetem_usuario_logado',email);
            sessionStorage.setItem('ondetem_usuario_tipo',tipoSelecionado);
            window.location.href = tipoSelecionado==='admin' ? 'admin.html' : 'index.html';
        }else{
            mostrarErro(resultado.erro||'E-mail ou senha incorretos.');
        }
    }catch{
        mostrarErro('Erro de conexão.');
    }finally{
        btn.disabled=false;
        btn.textContent='Login | Acessar';
    }
}

function mostrarErro(msg){
    loginErro.textContent=msg;
    loginErro.classList.add('show');
}
function esconderErro(){loginErro.classList.remove('show');}

document.addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin();});
</script>

</body>
</html>
