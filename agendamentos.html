<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Agendamentos - Onde Tem?</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d93d3d">
  
  <style>
    .agendamento-card {
      border-left: 4px solid #553A73;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }
    
    .agendamento-card:hover {
      box-shadow: 0 4px 12px rgba(85, 58, 115, 0.2);
      transform: translateX(5px);
    }
    
    .badge-pagamento {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
    }
    
    .vazio-container {
      text-align: center;
      padding: 60px 20px;
    }
    
    .vazio-container i {
      font-size: 4rem;
      color: #ccc;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <header class="bg-white py-3 border-bottom sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo d-flex align-items-center">
        <a href="index.html" class="text-decoration-none d-flex align-items-center">
          <i class="bi bi-b-circle-fill fs-2 text-danger me-2"></i>
          <span class="fs-4 fw-bold text-dark">Onde tem?</span>
        </a>
      </div>
      <h5 class="mb-0">Meus Agendamentos</h5>
      <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="limparAgendamentos()">
        <i class="bi bi-trash"></i> Limpar
      </button>
    </div>
  </header>

  <main class="container py-5">
    <div id="agendamentosContainer"></div>
  </main>

  <!-- Barra de navegação mobile -->
  <nav class="fixed-bottom bg-white d-md-none border-top py-2 bottom-nav">
    <div class="container-fluid d-flex justify-content-around text-center">
      <a href="index.html" class="nav-link-custom text-muted">
        <i class="bi bi-house-door-fill fs-4"></i>
        <span class="small d-block">Início</span>
      </a>
      <a href="#" class="nav-link-custom text-muted">
        <i class="bi bi-search fs-4"></i>
        <span class="small d-block">Buscar</span>
      </a>
      <a href="agendamentos.html" class="nav-link-custom text-danger">
        <i class="bi bi-calendar-check fs-4"></i>
        <span class="small d-block">Agendamentos</span>
      </a>
      <a href="#" class="nav-link-custom text-muted">
        <i class="bi bi-person fs-4"></i>
        <span class="small d-block">Perfil</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function carregarAgendamentos() {
      const agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];
      const container = document.getElementById('agendamentosContainer');

      if (agendamentos.length === 0) {
        container.innerHTML = `
          <div class="vazio-container">
            <i class="bi bi-calendar-x"></i>
            <h4 class="text-muted">Nenhum agendamento realizado</h4>
            <p class="text-muted">Comece a agendar seus serviços favoritos!</p>
            <a href="index.html" class="btn btn-danger rounded-pill mt-3">Voltar à Página Inicial</a>
          </div>
        `;
        return;
      }

      let html = '<h3 class="mb-4">Total de Agendamentos: <span class="badge bg-danger">' + agendamentos.length + '</span></h3>';
      
      agendamentos.forEach((agendamento, index) => {
        const pagamentoLabel = {
          'pix': 'Pix',
          'cartao': 'Cartão de Crédito',
          'local': 'Pagar no Local'
        };

        html += `
          <div class="card agendamento-card">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-8">
                  <h5 class="card-title mb-2">${agendamento.local}</h5>
                  <p class="card-text text-muted mb-2">
                    <i class="bi bi-calendar-event"></i> ${new Date(agendamento.data).toLocaleDateString('pt-BR')} às ${agendamento.hora}
                  </p>
                  <p class="card-text text-muted mb-0">
                    <i class="bi bi-clock-history"></i> Agendado em: ${agendamento.timestamp}
                  </p>
                </div>
                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                  <span class="badge badge-pagamento bg-info">${pagamentoLabel[agendamento.pagamento]}</span>
                  <button class="btn btn-sm btn-outline-danger mt-2" onclick="removerAgendamento(${index})">
                    <i class="bi bi-trash"></i> Remover
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function removerAgendamento(index) {
      if (confirm('Tem certeza que deseja remover este agendamento?')) {
        let agendamentos = JSON.parse(localStorage.getItem('agendamentos')) || [];
        agendamentos.splice(index, 1);
        localStorage.setItem('agendamentos', JSON.stringify(agendamentos));
        carregarAgendamentos();
      }
    }

    function limparAgendamentos() {
      if (confirm('Tem certeza que deseja limpar TODOS os agendamentos? Esta ação não pode ser desfeita.')) {
        localStorage.removeItem('agendamentos');
        carregarAgendamentos();
      }
    }

    // Carregar agendamentos ao abrir a página
    document.addEventListener('DOMContentLoaded', carregarAgendamentos);
  </script>
</body>
</html>
